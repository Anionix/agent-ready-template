name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner audit
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: jdx/mise-action@69c24ed9206bc145dcdd8fa072fc6031ceb14c8d

      - name: Install tools
        run: mise install

      - name: Validate environment
        run: mise run doctor

      - name: Install dependencies
        run: mise run install

      - name: Lint workflows
        run: mise run workflow-lint

      - name: Audit workflow pins
        run: mise run workflow-pin-audit

      - name: Validate agent readiness
        run: mise run agent-ready

      - name: Validate public release readiness
        run: mise run public-release-check

      - name: Scan for secrets
        run: scripts/secret-scan.sh --skip-public-release-check

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: scripts/wait-for-services.sh

      - name: Run checks
        run: mise run check
